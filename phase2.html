
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in to GitHub · GitHub</title>

<link rel="icon" href="https://github.githubassets.com/favicons/favicon.svg">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Bungee&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins', sans-serif;
text-align:center;

background: linear-gradient(-45deg,#6aa9ff,#1b4f91,#001f3f,#3b82f6);
background-size:400% 400%;
animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
background:white;
padding:60px;
border-radius:20px;
width:70%;
max-width:420px;
box-shadow:0 20px 50px rgba(0,0,0,0.35);
animation: float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0px)}
}

.logo{
width:80px;
margin-bottom:10px;
animation:bounce 3s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.team{
font-family:'Orbitron', sans-serif;
font-size:34px;
font-weight:700;
letter-spacing:2px;
color:#1b4f91;
margin-bottom:15px;
}

h2{
font-family:'Bungee', sans-serif;
margin-bottom:25px;
letter-spacing:2px;
color:#0b2f5e;
}

input{
width:100%;
padding:13px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:18px;
font-size:14px;
}

.link{
display:inline-block;
margin-top:10px;
background:linear-gradient(135deg,#3b82f6,#1d4ed8);
color:white;
padding:14px 28px;
border-radius:12px;
border:none;
cursor:pointer;
}

.error{
color:red;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<img class="logo" src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png">

<div class="team">TEAM AB</div>

<h2>Sign in to GitHub</h2>

<form id="loginForm">

<input id="passwordInput" type="password" placeholder="Password" required>

<button class="link" type="submit">Sign in</button>

</form>

<div id="error" class="error"></div>

</div>

<script>

/* password pool */
const passwords=[
"123456",
"111111",
"admin",
"qwerty",
"password"
];

/* generate random password ONCE when page loads */
const activePassword=passwords[Math.floor(Math.random()*passwords.length)];

/* login logic */
document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

let entered=document.getElementById("passwordInput").value;

if(entered===activePassword){

let tab=window.open("","_blank");

tab.document.write(`

<!DOCTYPE html>
<html>
<head>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Poppins;

background: linear-gradient(-45deg,#6aa9ff,#1b4f91,#001f3f,#3b82f6);
background-size:400% 400%;
animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.box{
background:white;
padding:60px;
border-radius:20px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.35);
animation: float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0px)}
}

.logo{
width:90px;
animation:bounce 3s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.team{
font-family:'Orbitron', sans-serif;
font-size:34px;
font-weight:700;
letter-spacing:2px;
color:#1b4f91;
margin-bottom:15px;
}

.check{
font-size:60px;
color:#4CAF50;
}

.btn{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<img class="logo" src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png">

<div class="team">TEAM AB</div>

<div class="check">✔</div>

<h1>Login Successful</h1>

</div>

</body>
</html>

`);

}
else{

document.getElementById("error").innerText="Wrong password. Try again.";
document.getElementById("passwordInput").value="";

}

});

</script>

</body>

</html>
